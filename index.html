<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qx  API 参考文档</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="background.js"></script>
    <script src="script.js"></script>

</head>
<body>

    <!-- 添加背景画布 -->
    <div id="backgroundCanvasContainer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;">
        <canvas id="butterflyCanvas" style="display: block;"></canvas>
    </div>

    <div class="container">

        <!-- 搜索栏容器 -->
        <div class="nav-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索 API 函数..."
                       onkeyup="searchAPI(event)"
                       onfocus="showSuggestions()"
                       onblur="hideSuggestions()">
                <button type="button" onclick="performSearch()" aria-label="搜索">
                    <i class="fas fa-search"></i>
                </button>
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>
        </div>

        <!-- 顶层导航 -->
        <div class="header-nav">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-code"></i>
                    <h1>Qx API 文档</h1>
                </div>
                <ul class="top-nav-links">
                    <li><a href="index.html" class="active"><i class="fas fa-home"></i>首页</a></li>
                    <li><a href="window.html"><i class="fas fa-window-maximize"></i>窗口管理</a></li>
                    <li><a href="color.html"><i class="fas fa-palette"></i>颜色处理</a></li>
                    <li><a href="graphics.html"><i class="fas fa-paint-brush"></i>图形绘制</a></li>
                    <li><a href="messages.html"><i class="fas fa-comments"></i>消息处理</a></li>
                    <li><a href="system.html"><i class="fas fa-cogs"></i>系统函数</a></li>
                </ul>
            </div>
        </div>



        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <h1>Qx  API 参考文档</h1>
            </header>

            <section class="welcome-section">
                <div class="welcome-card">
                    <i class="fas fa-rocket"></i>
                    <h2>开始使用</h2>
                    <p>探索 Qx ，从0基础到开发自己的应用。</p>
                    <a href="Qx.zip" class="btn-secondary">下载Qx.zip</a>
                </div>

                <div class="welcome-card">
                    <i class="fas fa-book"></i>
                    <h2>API 文档</h2>
                    <p>详细的功能说明、参数列表。</p>
                    <a href="#modules" class="btn-secondary">浏览所有模块</a>
                </div>
            </section>

            <section id="modules" class="modules-section">
                <h2><i class="fas fa-th-large"></i> 函数板块：</h2>

                <div class="module-grid">
                    <a href="window.html" class="module-card">
                        <div class="module-icon window">
                            <i class="fas fa-window-maximize"></i>
                        </div>
                        <h3>窗口管理</h3>
                    </a>

                    <a href="color.html" class="module-card">
                        <div class="module-icon" style="background: #9b59b6;">
                            <i class="fas fa-palette"></i>
                        </div>
                        <h3>颜色处理</h3>
                    </a>

                    <a href="graphics.html" class="module-card">
                        <div class="module-icon graphics">
                            <i class="fas fa-paint-brush"></i>
                        </div>
                        <h3>图形绘制</h3>
                    </a>

                    <a href="messages.html" class="module-card">
                        <div class="module-icon messages">
                            <i class="fas fa-comments"></i>
                        </div>
                        <h3>消息处理</h3>
                    </a>

                    <a href="system.html" class="module-card">
                        <div class="module-icon system">
                            <i class="fas fa-cogs"></i>
                        </div>
                        <h3>系统函数</h3>
                    </a>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
